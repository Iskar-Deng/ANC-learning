name: anc
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip

  # Core scientific/runtime packages.
  - "numpy>=1.26,<2"
  - "tqdm>=4.66"

  # Semantic extraction.
  - "spacy>=3.7,<3.9"

  # Training/evaluation.
  - "pytorch>=2.4,<2.6"
  - pytorch-cuda=12.1
  - "transformers>=4.46,<5"
  - "datasets>=2.20"
  - "accelerate>=0.26"

  # DELPH-IN ACE wrapper. ACE itself is an external binary; see RUNPOD_SETUP.md.
  - pip:
      - "pydelphin>=1.9,<2"
